services:
    app:
        image: app
        container_name: simple_pay_app
        restart: unless-stopped
        build:
            context: .
            dockerfile: ./docker/php-fpm/Dockerfile
        depends_on:
            - redis
            - db
        networks:
            - simple_pay
    nginx:
        image: nginx:stable-alpine
        container_name: simple_pay_nginx
        ports:
            - "8080:80"
        restart: unless-stopped
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./public:/var/www/html/public:ro
        depends_on:
            - redis
            - db
            - app
        networks:
            - simple_pay

    db:
        image: mariadb
        container_name: simple_pay_db
        ports:
            - "3310:3306"
        restart: unless-stopped
        volumes:
            - "db_data:/var/lib/mysql"
        environment:
            MARIADB_ROOT_PASSWORD: "${DB_PASSWORD}"
            MARIADB_DATABASE: "${DB_DATABASE}"
            MARIADB_USER: "${DB_USERNAME}"
            MARIADB_PASSWORD: "${DB_PASSWORD}"
        networks:
            - simple_pay

    redis:
        image: redis
        container_name: simple_pay_redis
        restart: unless-stopped
        volumes:
            - "redis_data:/data"
        ports:
            - "6310:6379"
        networks:
            - simple_pay

    queue:
        image: app
        container_name: simple_pay_queue
        restart: unless-stopped
        depends_on:
            - db
            - redis
        networks:
            - simple_pay
        command: |
            sh -c "sleep 5; php artisan horizon"

volumes:
    redis_data:
        driver: local
    db_data:
        driver: local

networks:
    simple_pay:
        driver: bridge
